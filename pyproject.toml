[tool.black]
line-length = 120
target-version = ["py39", "py310", "py311", "py312", "py313", "py314"]
include = '\.pyi?$'
exclude = '''
(
    /(
        \.eggs
        | \.git
        | \.hg
        | \.mypy_cache
        | dist
        | docs
    )/
    | foo.py
)
'''

[tool.mypy]
python_version = "3.9"
show_error_codes = true
warn_return_any = true
warn_unused_configs = true

[tool.pyright]
pythonVersion = "3.9"