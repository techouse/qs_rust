name: Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_call:

defaults:
  run:
    shell: bash

permissions:
  contents: read

jobs:
  msrv-meta:
    name: Read MSRV
    runs-on: ubuntu-latest
    outputs:
      msrv: ${{ steps.read-msrv.outputs.msrv }}

    steps:
      - uses: actions/checkout@v6

      - id: read-msrv
        name: Read rust-version from Cargo.toml
        run: |
          set -euo pipefail
          msrv="$(
            awk -F'"' '
              /^[[:space:]]*\[package\][[:space:]]*$/ { in_package = 1; next }
              /^[[:space:]]*\[/ { in_package = 0 }
              in_package && /^[[:space:]]*rust-version[[:space:]]*=/ { print $2; exit }
            ' Cargo.toml
          )"
          if [[ -z "$msrv" ]]; then
            echo "failed to read package.rust-version from Cargo.toml" >&2
            exit 1
          fi
          echo "msrv=${msrv}" >> "$GITHUB_OUTPUT"

  stable:
    name: Stable test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      CODACY_PROJECT_TOKEN: ${{ secrets.CODACY_PROJECT_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        if: matrix.os == 'ubuntu-latest' && (env.CODECOV_TOKEN != '' || env.CODACY_PROJECT_TOKEN != '')
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Test all features with coverage
        if: matrix.os == 'ubuntu-latest' && (env.CODECOV_TOKEN != '' || env.CODACY_PROJECT_TOKEN != '')
        run: cargo llvm-cov --all-features --locked --lib --tests --lcov --output-path lcov.info --ignore-filename-regex '(^|/)src/bin/'

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && env.CODECOV_TOKEN != ''
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: techouse/qs_rust
          files: lcov.info
          fail_ci_if_error: true

      - name: Upload coverage to Codacy
        if: matrix.os == 'ubuntu-latest' && env.CODACY_PROJECT_TOKEN != '' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        continue-on-error: true
        uses: codacy/codacy-coverage-reporter-action@v1
        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          coverage-reports: lcov.info

      - name: Test all features
        if: matrix.os != 'ubuntu-latest' || (env.CODECOV_TOKEN == '' && env.CODACY_PROJECT_TOKEN == '')
        run: cargo test --all-features --locked

  feature-matrix:
    name: Feature matrix
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Default features
        run: cargo test --locked

      - name: Serde feature
        run: cargo test --locked --features serde

      - name: Chrono feature
        run: cargo test --locked --features chrono

      - name: Time feature
        run: cargo test --locked --features time

      - name: Serde + chrono compile check
        run: cargo test --locked --no-run --features "serde chrono"

      - name: Serde + time compile check
        run: cargo test --locked --no-run --features "serde time"

      - name: Chrono + time compile check
        run: cargo test --locked --no-run --features "chrono time"

  quality:
    name: Quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Doc tests
        run: cargo test --doc --all-features --locked

  parity:
    name: Node qs parity
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: tests/comparison/js/package-lock.json

      - name: Bootstrap Node comparison fixture
        working-directory: tests/comparison/js
        run: npm ci

      - name: Node-backed parity
        run: cargo test --locked --test comparison --test parity_decode --test parity_encode

  msrv:
    name: MSRV (${{ needs.msrv-meta.outputs.msrv }})
    needs: msrv-meta
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: ${{ needs.msrv-meta.outputs.msrv }}

      - uses: Swatinem/rust-cache@v2

      - name: Test all features on MSRV
        run: cargo test --all-features --locked

  package:
    name: Package
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Package contents
        run: |
          set -euo pipefail
          cargo package --locked --list > /tmp/package-list.txt
          ! grep -E '^(fuzz/|tests/|scripts/|perf/|\.github/|\.vscode/|\.gitignore$|AGENTS\.md|pyproject\.toml$|src/bin/|src(/.*)?/tests(/|\.rs$))' /tmp/package-list.txt

      - name: Package check
        run: cargo package --locked

  ci-required:
    name: CI Required
    if: ${{ always() }}
    needs:
      - stable
      - feature-matrix
      - quality
      - parity
      - msrv
      - package
    runs-on: ubuntu-latest
    env:
      STABLE_RESULT: ${{ needs.stable.result }}
      FEATURE_MATRIX_RESULT: ${{ needs.feature-matrix.result }}
      QUALITY_RESULT: ${{ needs.quality.result }}
      PARITY_RESULT: ${{ needs.parity.result }}
      MSRV_RESULT: ${{ needs.msrv.result }}
      PACKAGE_RESULT: ${{ needs.package.result }}

    steps:
      - name: Verify required job results
        run: |
          set -euo pipefail

          results=(
            "stable:${STABLE_RESULT}"
            "feature-matrix:${FEATURE_MATRIX_RESULT}"
            "quality:${QUALITY_RESULT}"
            "parity:${PARITY_RESULT}"
            "msrv:${MSRV_RESULT}"
            "package:${PACKAGE_RESULT}"
          )

          failed=0
          for entry in "${results[@]}"; do
            job="${entry%%:*}"
            result="${entry#*:}"
            echo "${job}: ${result}"
            if [[ "${result}" != "success" ]]; then
              echo "::error::${job} finished with result '${result}'"
              failed=1
            fi
          done

          exit "${failed}"
